
service:
  db:
    image: postgres:latest
    ports:
      - "5432:5432"  
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

  ecomerce:
    build:
      context: .
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    depends_on:
      - db


  