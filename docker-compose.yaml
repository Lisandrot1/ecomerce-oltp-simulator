services:
#####################################
# SERVICIO DE POSTGRESQL
#####################################
  db:
    image: postgres:latest
    ports:
      - "5432:5432"  
    volumes:
      - ./src/database:/docker-entrypoint-initdb.d/
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${DATABASE}
#############################################################
# INTERFAZ GRAFICA DE PGADMIN4 PARA CONECTAR CON POSTGRESQL
############################################################
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: lmlisandro3@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80"
    depends_on:
      - db
################################################
# SERVICIO DEL ECOMERCE EL QUE CREA LA DATA
###############################################

  ecomerce:
    build:
      context: .
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    depends_on:
      - db


volumes:
  postgres_data:
  